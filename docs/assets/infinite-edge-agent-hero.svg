    <text x="34" y="96" class="small">Production vs Kernel Lab</text>
  </g>

  <g transform="translate(1184 292)">
    <rect width="260" height="136" rx="20" fill="#0E1E27" stroke="rgba(255,255,255,0.18)"/>
    <rect x="30" y="31" width="54" height="42" rx="9" fill="url(#gold)"/>
    <rect x="39" y="40" width="36" height="8" rx="4" fill="#07131A"/>
    <rect x="39" y="55" width="28" height="8" rx="4" fill="#07131A"/>
    <text x="104" y="54" class="label">WebGPU</text>
    <text x="34" y="96" class="small">Compiled inference</text>
  </g>

  <path class="line" d="M458 360H500"/>
  <path class="line" d="M800 360H842"/>
  <path class="line" d="M1142 360H1184"/>

  <g transform="translate(158 480)">
    <rect width="402" height="80" rx="18" fill="rgba(86,214,181,0.12)" stroke="rgba(86,214,181,0.28)"/>
    <text x="28" y="34" class="label">Production Backend</text>
    <text x="28" y="60" class="small">compiled-browser-webllm</text>
  </g>

  <g transform="translate(600 480)">
    <rect width="402" height="80" rx="18" fill="rgba(248,198,107,0.12)" stroke="rgba(248,198,107,0.30)"/>
    <text x="28" y="34" class="label">Kernel Lab</text>
    <text x="28" y="60" class="small">SSA, KVSwap, TSP, fusion</text>
  </g>

  <g transform="translate(1042 480)">
    <rect width="402" height="80" rx="18" fill="rgba(46,157,211,0.12)" stroke="rgba(46,157,211,0.28)"/>
    <text x="28" y="34" class="label">Readiness Gates</text>
    <text x="28" y="60" class="small">grounded exact answers</text>
  </g>

  <g transform="translate(156 590)">
    <rect width="160" height="34" rx="17" fill="#56D6B5"/>
    <text x="27" y="23" class="tiny">LOCAL-FIRST</text>
  </g>
  <g transform="translate(332 590)">
    <rect width="168" height="34" rx="17" fill="#F8C66B"/>
    <text x="27" y="23" class="tiny">HOSTED PROOF</text>
  </g>
  <g transform="translate(516 590)">
    <rect width="182" height="34" rx="17" fill="#8DD4FF"/>
    <text x="27" y="23" class="tiny">BROWSER NATIVE</text>
  </g>
