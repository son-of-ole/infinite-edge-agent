    <path d="M48 30L76 47V81L48 98L20 81V47L48 30Z" fill="url(#teal)"/>
    <path d="M48 47V81M31 56L65 75M65 56L31 75" stroke="#07131A" stroke-width="4" stroke-linecap="round"/>
